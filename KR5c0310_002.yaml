front:
  text: 修鍊大丹要旨卷下蘭六
  hash: sha256:0f20a0655f0a9be53420d6f6c0a41485f9426afd4484831c1c0ed2482e398ee4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0310_HFL_002-001a, image: hfl/0591/0591-076.png}
body:
  text: 硃砂鼎方硃砂真正如箭頭光明出辰州者以三斤為則用浣火絹袋盛之以桑柴灰熱水淋汁了再淋滿盛於砂鍋內却將硃砂袋懸挂灰汁中上不露袋下不著底又用一砂鍋蓋上以灰滓固口縫桑柴火文武燒煮三七日夜火不可太急亦不可太慢如常魚眼水沸煮之至期取出看黑色透明為度如不黑明再煮三日夜如常要看灰汁如淺隨即添滿又固口縫每一夜一次看如是黑明完了將出來待冷却將新山澤銀剪鑿碎於砂合子先以黑紙為貼身然後銀一層硃砂一層裝滿合子用鐵線十字縛定仍用赤石脂為末用紙筋調均固濟合口無令氣泄謂之子母相生用一土坑深二尺四寸埋之三七日取出於甘土鍋內銷自然成汁即係銷銀一般比及埋硃砂時先做黃蠟鼎模完備候乾取出在內黃蠟空其模子等候臨期鑄要燒熱模子汁下則勻比鑄之先要將鐵扇草末放入模內令乾疾成鼎之後看鼎大小蓋用花銀打造一箇蓋蓋上留一竅子如將汞入鼎內却於竅內放下鐵扇草末用灰火溫溫煮之自然片時即乾成寶每一斤却用三兩赤毛入內為骨金公五錢為閏用乾柳枝攪之勻又用硼砂焰硝少許入內去其垢膩傾內隨成真寶如無鐵扇草即用木律草根為末代之亦可其詩曰一葉一枝花深山是我家硃砂見我爛水銀結成砂此草與天南星相類一葉如大麻葉一般七瓣一花如鈴鐸一般倒垂花紫心黃者是也鑄鼎之法須用雄黃硫黃雌黃五加皮獨掃紫河車馬齒莧人言此八味各等分另為細末用赤石脂和勻先於蠟模上帖內外却用爛熟紙筋黃砂泥護塑令厚伺乾烘出原蠟鑄之妙砂鍋山澤銀沙合子甘土鍋汞入鼎赤毛三兩金公五錢硼砂焰硝各少許鐵扇草青葉紫背背有毛青白花花心黃而空風吹不動無風自搖如有二種术律二種根白葉青子黃身赤丹華丹好金腳人言四兩為末硇砂硼砂乳香各半錢入水火鼎升於鼎蓋下臨用時入輕粉以黃蠟油和丸每二兩可點十兩重赤毛入真寶三七四六皆可然後入梅鍋內再三煮之即成寶也不審輕粉與黃蠟油多少通神丹水銀八兩硫黃二兩用新鐵鍋炒成砂子或有煙焰即以醋灑候研細入水火鼎醋調赤石脂封口鐵線扎縛晒乾鹽泥固濟用炭二十斤煆如鼎子裂蘸石脂頻抹其處火盡為度經宿取出研細再入水火鼎凡七次忌尸氣婦人豬犬等物須淨室齋戒擇日時為之妙寶真方汞五錢辰砂五錢雄黃三錢右用黃蠟一兩作彈子一箇却將馬齒莧十兩煮汁和白芨末五兩紙筋就入蘆甘石末針砂磁石代赭石白硫黃黃丹金精石鬱金研如泥得所作二分先將一半裹蠟彈均無縫候乾方入汞砂黃等封閉就將前藥泥一半再裹一層令均候乾方才下銷銀鍋內用磨瓦蓋頂固濟務在無令走氣候乾再用六一泥通身固濟鐵線縛住十分候乾方用二十四兩炭火慢慢煨之一七候通身紅就去火待冷取開去其外匱止留貼身之匱用燒紙灰將米湯和再燒過用熟絹一袋盛之著肉身養之七七取開為末將杏核作一眼去仁灌入藥末銅鐵線縛定鹽泥固濟入香爐火內燒之一伏時取出即成真寶每日止許食用一錢不許富貴多用並不許有違祖願切不可亂傳非人罪不輕恕愼之愼之有緣遇者宜自保重耳爐置中室圜象爐之南其制外圓內方圓徑一尺四寸方徑一尺二寸中深七寸為鐵柵以限上下通身高一尺五寸外作三級每級高四寸闊三寸下級闊加倍究其南面之下地通虛至柵以便出灰上一級書五行南火北水東木西金土居於中次二級書八卦震東巽東南離南坤西南兑西乾西北坎北艮東北後天位次也下級為罡道火下時步三匝于上爐南設香几圜象北後坐榻一主人日守坐于上具炒煮所用器物皆列置左右兩旁凡藥物鼎合並須櫝藏勿宜褻玩于外執事者俱令出次他所無幹不許輒入齋房主人有事或出則扃鑰之混元九轉金丹訣第一轉養砂成丹寶詩曰白向白中取赤向赤中求從教金紫貴爭奈勝王侯陰真人曰良無頭釜無耳不用藥直下制老子曰紅鉛黑汞大丹頭水銀一味獨為優紅鉛硃砂也黑汞水銀也先以紅鉛製成白硃砂然後和水銀相和合為寶而成造化之基滋養無窮之理次用良無頭十二兩於鐵合內鋪底上安好辰砂半斤再上良無頭末四兩蓋之以生黃土實填用醋蜜調赤石脂蚌粉封口縫又以六一泥固濟令乾入神仙爐下火四兩養七日足候冷取砂塊成寶碎之作匱歌曰用鉛不用鉛須向鉛中作若也用鉛時用鉛還是錯又曰燕雀不生鳳狐兔不乳馬若無真父母所生都是假第二轉見寶成寒林玉樹以見寶硃砂半斤入合子內澆汞二兩在上以醋蜜調赤石脂末蚌粉封口縫乾了更不固濟入爐先以二兩火養三日第四日加火二兩通養七日以子午卯酉時换火日足取出開看其汞皆乾如有些小油汞未乾再封口養火三日火候依前候汞乾再開合又澆二兩依前火養七日足開看其汞皆乾如此澆養四次得死乾汞八兩與見寶硃砂共一斤更不澆汞只虛養七日其合乾汞俱成寒林玉樹造化無窮如作生湧泉匱每次澆汞四兩養火依前法七日夜轉轉如此增汞至百兩且止之取上色乾者𤇨之則成無比之寶其物安置室中夜有光明鬼神見之潛伏若打器皿飛蟲不敢親傍若用未經𤇨者一兩可點紅銀十兩如山澤之先出者第三轉寒林變玉笋將前砂汞對停十六兩為末以十二兩入合令半實以筯插數孔量大小可澆汞四兩如栽蓮子相似上以餘四兩末蓋之醋蜜調赤石脂蚌粉封口縫令乾不固濟入爐如前養火七伏時日足開看其汞自然成錠子一如玉筍若過爐𤇨之即成至寶不養丹任用無窮修道之士仍加消息第四轉養小丹歌曰赤白二物先伏之方能擒得火龍兒但教金木歸洪治自得精成銷絳闈一點明星開鼎燦半輪紅日出爐飛丹成解變人間物始信權移造化機將前汞銀四兩鑄合子一箇如雞子樣內盛好辰砂一兩蜜調赤石脂封口縫令乾不固濟將前件養玉筍匱鋪蓋四時换火養七日取出其砂一兩不折不奪胎色拒火不動研為細末以楮汁丸為八十一丸以絳紗袋懸井中七伏時出火毒須擇三元甲子庚申或旦望甲辰清淨新井花水向太陽服一丸可延一紀之壽要丹知靈驗但將汞四兩於無油銚子內上放丹一丸以盞合以濕紙擁塞縫口於炭火中熬之其水銀作嬰兒笑泣聲相似良久聲絶時取看成垛上色之銀即丹之驗也餘丹置淨室中以絳紗袋盛之安於隱密處仍要積德助貧自貪富逸必遭其禍第五轉小靈丹養黃芽歌曰小靈丹驗早為佳造化功夫不用誇七七四時溫養了開爐一見變黃芽將小丹八兩虛養七伏時不用匱火候依前法了其藥成黃芽第六轉小丹黃芽養種金硃砂歌曰金砂養就色堪憐莫用多辭向外傳花滓好求經潔後萌芽須採未分前三龍共處庚辛就五虎同周辰巳圓從此紅娘脫身去一堆金骨始驚然右將黃芽為末作匱以辰砂塊子四兩用真金箔蜜貼身逐塊裹了入匱內蓋了以醋蜜調赤石脂蚌粉封口縫令乾次花滓上等茶芽同作六一泥固濟半指厚令乾入爐如前火候七日足取其塊成紫磨金又名金蠶第七轉金蠶作匱養黃芽以金蠶四兩入合澆汞一兩醋蜜調赤石脂蚌粉封口縫令乾更不固濟却入黃芽匱內再以醋蜜調赤石脂蚌粉封口縫令乾依前火候七日夜開視其汞皆抱金蠶生成金芽乃真仙物也亦依前澆汞一兩封固如前轉轉如此增養四次成四兩同金蠶八兩第五次澆汞二兩火候如前轉轉一次澆十六兩更不增澆只虛養七伏時得庚寶十六兩乃可鼓鑄鼎也第八轉鼓鑄金鼎於歲朔及三元甲子或上寅日擇淨室置爐建壇三層上列九星中畫八卦下開八門立劍四維懸鏡祭祀三清然後將庚寶十六兩鑄鼎如雞子樣可養大丹成寶立妙無極第九轉金丹大藥歌曰造化工夫熟見涯火龍大體是丹砂解將凡骨為仙骨能使貧家作富家祕訣既從達士得靈機休對小人誇好修陰隲皆天地反此應當禍不差一依鼎法祭謝然後好辰砂四兩納金鼎中用醋蜜調赤石脂蚌粉封口縫依前火候養九九八十一日足然後取出杵研極細以不近墳墓取自然楮汁和丸九九八十一丸絳紗袋子盛懸井中七伏時擇良日祭天地三清日月星辰諸神百鬼龍神社主本宅元辰誠心盟誓先將一分祭名山大川有道師衆歌曰仙方一卷世稀聞莫向愚癡説此門漏泄天機遭橫禍祕藏神訣入仙源造時莫使凡夫見養就休同俗子論三分一分須濟世丹成家積玩崑崙至寶訣千里根不以多少新潤者交廣生者老大而佳即根也右用一新生鐵銚子未經用者入汞於中以麻油煮之旋削藥根如爪甲片大投入候黃黑去再削旋以帛子裂之却取砂子安别所匱法以匱至尋常故古今祕其名云四氣子末水和為匱包而火之自辰至巳即成赤金也四氣之草人皆識之是處皆有人之所仰如日不可缺有頌讚曰秋生夏死養育人命粉如玉屑水調稍硬包彼神砂置之午家自辰至巳脫出金華外注結時用乾感煆時用渾沌也寶主軒轅亦三年而後悟之後訣於此此物乃五谷中一物稟金氣者秋冬乃茂春秀夏枯取其子粉如玉塵也人之所常食也若取其頭白至妙者水和匱之安灰中自辰至巳大火煅為金也篤志之士自有神告悟之者毋輕泄漏恐貽禍焉昔人不輕易授受漢期門郎程偉妻通神變化煎水銀成銀偉從受方妻謂偉骨相不應得之逼之不已妻乃尸解去賀知章謁賣藥王老問黃白術持一大珠遺之老人得珠即令易餅與賀賀心念寶珠何以市餅王老曰慳吝未除術何由成修鍊大丹要旨卷下
