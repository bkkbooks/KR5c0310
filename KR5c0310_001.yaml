front:
  text: 修鍊大丹要旨卷上蘭五
  hash: sha256:e7d0a6f7a30e175bcff0938e6e006c0fdf6bfdf8e5699f4852cba21263638eef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0310_HFL_001-001a, image: hfl/0591/0591-024.png}
body:
  text: 外丹要訣山澤之物二八為元山澤之物四六為團以團入元丙丁合乾山澤之物以硫炒堅用元為匱養死為鉛既得真鉛用汞方全朱砂同研再養以元其砂既死是謂大全取元合體可長於天觸類而長真死九還五者既備豈可妄傳某仰觀天地盜大虛而濟人鉛汞盜大乙而利物蓋盜我者盜我精氣鍊我魂魄在我未能收十全之功何以濟人利物哉天地相盜之理愚不可以輕傳而鉛汞相姤之道安敢不講究而推利人濟物之事哉其術以鉛為本以汞為元世人莫不知鉛汞為大丹之基往往多不明真鉛真汞之理與夫互相吞竊之道是以不知生生無窮之妙也且鉛汞之盜大乙當以大乙而資鉛汞鉛汞之自相吞盜當知其所本識其所藏明其所用察其所返斯始得造化之機也抑又考之雲龍風虎則神氣之道者神由母氣由子以神召氣以母召子孰召不至為其有吞竊之患故鉛汞而無成功外丹之術全在乎形氣亦不可不知也一氣之運斷可知其靈否孰不知靈者形不靈而氣靈生不靈而死靈水至清而結冰不清神至明而結形不明使冰一泮其水返清使形一定而神返明能知真死之理可以為大丹矣火龍玄珠大丹採得龍虎一斤稱四兩研細以熟帛二重包裹扎成雞卵之形剪去剩者令淨以黃土白砂炒成末稱一斤四兩扎成鵝卵形外以皮紙剪作條子以雞子清調糊掃在鵝卵上留一頭可頓得雞卵大口子便令乾其殼約令厚半指候乾以刀子刓破砂土包子逗出其中砂土用帛子拭令淨方可用也先以大殼口在上於底中先下青龍末八兩次安玄珠毬子次用崑崙紙剪環子搭在青龍末上留一半許不得近殼次下白虎未八兩了却以皮紙條襯在白虎末上外以紙條子蘸雞子清糊令殼子口了如殼子厚令乾用一大錢令納生炒了土二升許在鍋子坐大鵝卵殼於其中次以炒了砂土三升許四下並頂上填實了以藥合子鹽泥固濟方可入爐凡下火添水從本月上入火留對户出氣其十户皆塞之上以木盆蓋之亦留門户與下同逐月轉移門户用之如四兩火子午卯酉四時抽换新舊之火初四十九日足冷取出去砂土了成一玉毬子旋旋以刀中心勒破分成兩片專記上下弦號之勿令妄記中取玄珠去帛子灰了以黃蠟封入油甕內以土埋三日取出細研半夏糊丸如菉豆大每服三丸漸加至九丸鹽湯下日三服空心服所得靈汁收起隨多少依前鍊成四兩盡為度再稱如欠少以前玄珠添成四兩再研扎成一雞卵入上下弦內封固入爐火如前四十九日足取丹研細半夏糊丸如菉豆大依前服之收靈液再鍊藥盡為度稱成四兩再研包入上下弦內封固入爐四十九日足如此第五轉玄珠出時鑽一孔子可入汞一兩在內以上下弦合了入合養火子午卯酉六兩火養三日出銀也第九轉入汞試之成庚也第十轉打有四兩入上下弦內養火一周年半夏糊丸如黍米大每服一丸新汲水下服一兩地仙也用一丸點汞一兩成寶三丸救死人立活凡夫服一兩長年不老修行人服一兩得仙祕密勿泄非人天條甚重金丹法朱砂四兩或半斤用草汁並四十八津重淋之液入硫半兩同煮一伏時久愈佳如無草以醋脫煮却不用硫庚四兩用丹頭四錢入甘鍋作汁提起用鐵火筯攪作黃粉傾入淨瓷器內盡成粉為度以水淘之稱得元分兩不折為妙將粉稱一兩在外餘三兩却與煮了朱砂同研勻庚硃過氣方入甘鍋中外一兩金粉稱七錢蓋面以紙隔定再用山澤銀末四兩蓋頭以土築實入灰池中封固養火四兩七伏時啓合加火貼鍋一煆通紅一宿天明取出銀末其金硃真死可以細研入油缸中用火五兩養二伏時以西硼蓋頭大火一煆𤇨成至寶此一𤇨聖凡混合血氣流通金得聖體剛居柔位方能産化右聖凡既已交媾可再鎔成汁每兩庚入丹頭一錢如前攪成黃粉再研以煮過硃砂二兩同入甘鍋中上覆以前金粉七分糝面隔絶銀氣换新母銀硃四兩蓋頭封固鍋口入灰池中用火四兩養煆二伏時亦用半斤炭煆通紅一宿天明出爐所有金硃真死研細蓋金氣既多硃盡變為金末又用此一鬲銀末在上乃是神仙之法神交而形不相交金木不相間隔可為長生大匱永脫硃砂成寶匱養三黃而點化五金金丹論僕嘗歷考古今神仙立大丹之名曰金丹未聞有一家銀丹之説也夫金丹者取其不滅不壞不變不易堅剛之義可以永保長生究其為寶三黃不能汙其質丹砂不能吞其形可與天地同其長久與日月並其精華無一物可以比並且丹曰金丹鼎曰金鼎二者並取金為名也其必以金之寶而造之也然後既以造成賴此金之元氣可以化世寶三黃同登玉闕謂其以金寶而造之然後化之則明造化之機胡為丹經仙方充積棟宇其間所論丹母獨言乎真鉛及其分辨陰陽和合四象乃曰白金硃砂黑鉛水銀至於點化乃曰黃芽白雪雌雄二精閲盡丹經未嘗有一書及用金為丹之母特取金良者以養丹砂徒費工夫用火而去及借白金以助生育所養雖存其色未能盡善十年之內參之造化或以白金造室或以白金作蓋或以白金而作外墻上體陰陽交接之道下體蜾贏孕子之法細而詳之物情能傳其情交其精混其氣和其神隨物而轉參合造化體驗施為雖漸有所得而皆未造夫一蹴而就者也一日而成簡易明白之境精一純良之妙矣僕因思之曰丹砂染銀氣之深被金氣之淺則昔之所以為金今變而為銀矣染銀氣之淺被金氣之深則昔之所以為銀今變而為金矣感銀之氣尚淺被金之氣未深則為金為銀而未辨乎顔色尤不可不明乎生養感變之道夫既感而為銀矣而欲復還而為金不亦可乎大抵氣聚而成形者可以氣而變其形以質混而成形者終不能以氣而化其質僕造此法多失之金氣大薄銀氣大深為銀以轉為金未既徒事乎𤇨罨之功雖復還其為金之性終不免有耗折之偏繼自以往既識此病當以金而變養以氣化氣色不牢者而自還可也吁黃白之物雖産於天地造化之妙亦利於人生養之道變化之功也色之淺深實不逃乎一氣之用譬之接物正為梨接桃者其實甘以梅接杏者其實酸各有本然之性亦可積習薰陶蒸染之久與之俱化不見其所以為本然者矣僕夜以繼日焚香禱告參驗古今要圖簡易早遇真仙傳授大法乃出世之金丹頓空之上乘雖藏之以自祕亦不敢隱而無傳造靈砂貼身要訣粉霜一兩成塊者用三淋荷灰汁者一伏時以雌雄末醋調貼粉身先入銀母硃匱內養三日可以真死硃砂一兩硫黃一兩同於四十八津三淋之液內煮一伏時取出入甘鍋中上以死粉霜捺頭以銀硃再捺粉上養鍊七日真死取出先用死粉貼身次用死硃又用伏火飛硇貼此三貼身非人世所有並不吞母每兩各用半錢重勻為貼身切宜祕之養白雪要訣造成五行法前四象既以真死却將粉霜六兩薑自然汁煮一伏時荷灰汁同煮為妙取出在銀瓶內上用四象末捺頭外用蕎麥川椒香附子樟柳根訶利勒五味通固合外養煆再取出入象末內養火二七日真死研入四象末內合成五行大丹之匱却將粉霜成塊者用三黃煮貼了遂入獨粉匱內養令真死號曰白雪獨神匱白雪獨神養粉要訣粉霜堅鍊者用一味薑汁一味藕汁同煮三伏時常如魚目沸入三黃在汁中同煮略借氣之用也次以生雄貼粉身入白雪匱內鋪再養火三七日候粉真死可搗為末作獨養粉匱又於獨粉匱內養出粉霜其妙難窮不過鉛池便是山澤至寶又以死粉為匱復將生粉用前二汁入生硫雄同煮三伏時取出可以生雄貼粉於前死粉內脫出粉霜可養一黃化物糝制要訣僕自幼鍊養靈砂非不知以母養子以子為母脫經三次轉至九還慣養黃芽鍊成紅粉幾二十年不獲未免含羞忍辱持鉢於人門閲盡丹經參求稽考皆無所取就後得異人點化和合四象攢簇五行得合天地之造化雖點頑成物變貨成真尚未造安身立命利物濟人之域復思異人言子母有吞竊之患鍊紅粉有長生之功推其所旨凡三煅而不全就七養而未全成後養紅粉依方煮鍊别求一匱法始得大有效驗今將養粉火訣載之方軸後人得之不可輕泄大抵紅粉為之藥附金水長銀芽凡母之氣結成其體與硃靈附陽者大相遼遠非假神室煅之不就非用神符匱養之不成非三淋荷葉汁煮之不伏養法常用溫火先蒸後煅留而不去若遽加大火一煆而折一養而去如養嬰兒如弄姹女調停火候方得真死紅粉死乃水銀乾水銀乾而糝制成寶若泄此事禍不旋踵矣訣曰煮如蟹眼煆不純陽養令溫暖始不飛揚一二三日旦夕各一兩四日旦夕各兩半開罐上在下下在上五日六七日一兩半硃靈口訣夫硃靈者皆有吞竊之患惟粉見母而無吞竊之憂硃依硫而成體硫能竊耗母所以見硫而氣過雖竭天下之金石窮天下之靈苗亦不能免此患也硃也靈也粉也三者互相制伏始獲點化之功也靈砂已成垛用刀削去硫氣移下鏡面顛倒入鼎扶持埋向鼎口外再納泥正固砂邊勿令火傷砂體用炭緩緩煆之勿令鏡面皮膚破裂用醋調藥貼身先入母匱以陰爐上火下水溫養七日次陽鼎上水下火鍊養七日甑得祕密硫氣不出汞氣不飛子母兩全始獲其利某得養靈砂之妙旨亦得師傳之法利在點化之妙止於丹陽丹陽之法换骨與世寶爭衡於世豈為易事耶衆藥之用莫如白雪白雪之藥即是粉霜其物甚難於養鍊雖用沸湯衝過荷在汁煮一伏時入在紅粉匱內或以神室上以四象末蓋頭外用黃藥子川狼毒紫河車八角鏡瓦松細辛鳳尾石韋八味蜜調固濟用火養煅寒爐取出剝去外藥將神室栽粉入四象末內養令真死無拘日數時依師旨教深有效驗先又白金三錢雜以赤金七錢投下雌粉二錢並投死靈半兩其靈分胎在上赤既以白而死靈亦不復為赤所染矣再將赤金一兩同鎔又以死靈半兩併前投之砒粉二錢先點其靈後分胎在上赤物復變為純陽之寶二以死靈共一兩止得八錢又以死信粉二錢點之同鎔作汁投下生鐵半兩生硝三錢以泥塞口大火一扇破鍋取淨再换鍋更得鉛五錢煎之淨二兩七錢此换骨之法也白雪之效初成上乘之丹法也後有神符一丹亦是粉霜養鍊功效之大不可與白雪同日語此某於神符誠然造於極至之妙神符要訣白雪中傾下汞候乾成芽取聖芽八兩或一斤鍊養成粉栽蓮粉霜在內可煮可煅養之二七日每二錢可點赤而化上色换骨丹陽此丹依師變轉又名神符白雪一錢可點一兩赤物成寶亦可糝汞一錢乾一兩成寶某在丁亥歲造成白雪脫出神符又變玉神符白雪乾汞成寶點化丹陽及將前四象𤇨燒每一兩只有寶三錢已上某夜不能寐日不能食又參明師乃曰靈砂硫氣不斷粉中有汞汞能活硫日往月來死而復生每三兩只主有寶三錢餘者為膠油糖之物而去矣某再告師遂將存汞去硫之訣始獲十全效矣鍊硃去硫第一法先養靈砂成寶去硫後養硃去硫四象去硫五行不去詩曰以硫結汞斷靈砂用母栽蓮養我家留汞去硫為大寶三還伏火見黃芽死汞一味最為佳却以硃汞結成砂水火鍊來經四七周天火候聖黃芽黃芽一味養丹砂四星匱一是生涯火候調停才七七乾汞成真足可誇鍊硃靈去硫存汞成寶論夫靈砂硃砂見寶乾汞成銀世之絶學也往往煅鍊靈硃者世傳之久矣所作者莫知其數得寶成事者未審其人靈砂者若以草木煮鍊八石資養不用母者不能成其事業用母而不用草木制者蝕母甚而不能靈通母少子多者亦不能制其真死既云有母不靈無母不成既母多而子少但不借體還魂者為妙母少而子多者但不疏碎堅體者為佳無母者但疏碎而不能堅剛純食母者而汞去借母之體也有母無母母多母少二者皆死燒𤇨青脆無寶者何也大抵有母無母之義學人不知皆為硫之所拘始者無硫獨汞不能成二氣之妙儻成靈砂既死之後硫不去寶不能成其間母與汞事然一體皆為硫氣所攝燒之青脆作汁有艷有母者外有白衣中間青脆無母者但青黑作汁二者俱有鬼𦦨黃煙尚存若便以𤇨煎硫蝕母汞經火愈燥愈裂汞母難以存焉皆為硫火一時盡化為油糖而已自可嘆哉空費施為徒勞作用古仙云硫黃在金石之中為將軍謀慮出焉又為黃婆又能擒汞而伏又能媒合銀母而成其質殊不能分胎離體成銀爾有云太平只許將軍定不許將軍見太平汞既伏矣硫不去而及有所惡正此義也僕今既事業在手漏泄機緘不為得罪於天庶幾有補於將來志誠之士得者幸無輕視但念學事業勤苦不易者也戒之戒之訣云小玉即硝四兩以長流水同煮獨神即鐵花一斤一日為度硃靈死者但以獨四兩養一兩封固入匱灰池中四圍離灰可簇火一煅來日取出靈砂雪白色如來日未白再以靈砂用小玉煮少時再入匱匱火簇養一夜定成白體之物入𤇨爐中只以死硼硝些子點之下生鉛少許其物成絶色世寶矣神雪丹陽四皓丹粉霜二兩水晶砒一兩硼砂二錢硇一錢乳香三錢焰硝一錢右六件𢶞細拌和之用銀末四兩拌入水火鼎內以八斤火足稱依靈砂法火候一同寒爐開其藥飛在鼎口四向其色黑可收之其銀母墜底去母不用取藥收之名曰四皓丹四皓丹轉四寶神雪丹四皓丹末三兩粉霜五錢砒二錢半硼半錢硝一錢乳香一字硇半字已上並用生者右用銀粉二兩半同前藥拌𢶞細勻生薑汁和為劑以銀臠子捲成筒子入藥在內用細鐵線縛定用水中金為匱上下鋪蓋固濟入灰池去令一寸養火一十六日子午卯酉各一兩抽换新火也日足冷剝去銀薄收之可化丹陽不然將藥鐵臼杵為細末可為子母匱四寶神雪丹轉神符白雪丹將前四寶丹四兩或半斤一斤為匱內轉養粉霜作白雪丹口訣神符白雪丹轉輕紅粉丹大光明硃砂四兩四十八津者一伏時用銀臠子半兩裹之入白雪丹養火七日一兩子午卯酉抽换成寶亦可充杖子為丹陽亦合庚道點黃不然將此物和神符同養火三七日可以糝制一錢紅粉可乾汞五兩湯瓶之上寶成方過氣爐𤇨成上等至寶亦轉為庚矣神符白雪丹養靈砂為紫河車丹白雪丹匱內養靈砂七日成銀其靈砂和白雪亦可點杖為十分丹陽三錢一兩成上色銀矣紫河車匱養三七母砂二八感氣一兩火候二時卯酉一七日母砂子白𤇨成寶亦對衝杖子成上等丹陽將紫河車養出母砂為銀蟾丹匱轉養得粉霜制金矣養成神粉轉雌黃名金英丹葉子雌黃四兩四十八津煮一伏時洗淨用十分好庚箔一兩包之鐵線十字縛之於神粉匱內養一十六日出剝了金箔一錢點一兩花銀成菜花金矣神粉匱養雄黃為金雄丹雄黃四兩四十八津煮一伏時出淨淘洗用足色庚一兩包之於神粉匱內養十六日取出金箔一錢化花銀一兩成官金矣丹房雜法藥石一斤乳細用瓦鉢盛之以鳳尾草又名鵝青草或山慈姑或馬齒莧或躑躅或芭蕉根但死砒草皆可用以四五擔搗擂碎榨自然汁或添入清水用大缸盛之澄定二三日取上面清汁煮藥石七日了如粥糊狀再添汁煮三五日以藥石炭火上燒看煙盡有半石可用熬藥至八九分乾用好皮紙盛爐灰頓在鉢內藥上滲去水烘乾入合如法固濟四兩火養月餘用甘鍋固濟窟煆再入合固濟養令真死雪白輕淞無煙為度方過母氣為匱每八兩藥以好銀八兩火煽鎔作汁用杭州鍋盛之將上藥分作六箇小包逐包攛在銀上其藥亦微作汁略攪轉又下一包如此六包皆盡通攪轉提超鍋候冷破鍋取出其銀在下依然白其藥在上帶黃色方可為匱其銀不折分毫用鉛三兩入銀內同鎔煽去鉛方可打得其銀亦可養硃打靈砂法水銀八兩好硫二兩乳細炒成青金加些雌雄或半兩入水火鼎封固得密下手便下半鼎火才火紅上面固藥氣超得盡用鹽泥刷之如此半箇時候方加火至七分鼎下裏面藥升時水自然滚候滚將靜時加大火鼎一伏時其堅如鐵打硃靈法假以前炒成青金頭五兩入硃砂五兩同乳細再加生硫二錢加再炒半箇時辰如前法入鼎進火打硃砂法硃砂十兩入好硫六兩加雌二錢亦可同乳細入銚中樣火炒半箇時辰入鼎固濟如前法用火每硃一兩出鼎止有八錢重煮砂法硃砂每兩分作十塊用絹袋盛之入藥內煮三日方貼身入匱煮藥地榆五加或橘葉漢椒或貫仲荷葉灰貼身法每砂一兩作十塊用銀薄一錢杭州名臠子每一兩約二十片貼上砂逐塊務要捺得緊實然後鋪蓮入砒匱半斤養六兩砂上下二層入合固濟以三兩火養六日以四兩火養三日取出其硃青黑色裏面紅方可入母匱入母匱法山澤銀八兩以炭末作粉亦得或以粗粳鋪在大浴盆內用水和之次將銀鎔成汁用竹簡左手拏住右手提鍋納銀於竹簡上淋下粳內自然珠圓每母硃半斤以砒匱藥二兩拌在母上作衣每斤母養硃四兩作兩合入封固養火五日三兩四日四兩火出合將靈𤇨成寶或點化點化養得硃靈真死母子兩全用硃靈一兩在甘鍋底次用骨頭粉一兩蓋又以鉛粉或黃丹蓋頭自上發火大煽作汁候冷破鍋取之用鉛煎得一兩五錢九成銀𤇨靈硃法養死砂一兩用鉛一兩先鎔作汁然後下砂扇去鉛盡自然雪白𤇨母匱將養過母銀用黃丹二兩打拌令勻丹食火一伏時取出投鉛煎之靈砂不倒再煅即死硃砂如入母匱了有八分死用慈姑草搗碎或大金螃蟹但伏硫草皆可以短樣砂鍋下面用草中間用硃靈上面厚用草蓋用瓦陀蓋面不必封固却以磚石砌爐中安藥鍋四圍用炭上面亦用炭自上發火至下通紅其鍋亦紅先以爐灰一斗在邊用水拌濕候藥鍋通紅草煙將盡取藥鍋在濕灰內用濕灰蓋之候冷取出其硃自然真死添補靈砂砂二兩用前藥煮乾以母四兩成粉用生砒一兩為末先炒母熱次下砒再炒入却以此母養砂二七日一七日二兩火五日二兩半二日三兩再六兩火一夜取出其砂得一兩八錢重用鉛煎成寶一兩砂得八錢銀其母銀用黃丹二兩拌勻皮紙裹再布裹埋地內三日取出烘乾先以鉛四兩入甘鍋鎔作汁次下母同鎔為添補法結母砂法母一兩打作二三片用水銀五兩同裝在建盞內上面黃蠟一兩清油三四兩同煮其油蠟大鎔半箇時辰取起候冷用刀四圍取起其油蠟作一塊下面銀與汞交媾將銀子取下砂又銀子如前法結之以銀盡為度此法度只結二八母砂硃砂取汞硃砂十兩乳細用松炭末和之裝在大甘鍋內至六分用松炭末蓋之上用小瓦片裝在上用鐵線結成一團片蓋在鍋口用鐵線縛之打一土窟先安小瓶在窟內瓶內用水將甘鍋蓋覆轉在瓶口用泥封口四圍磚砌上面用大火一煆再加半爐火每硃一兩可得真汞七錢在瓶內去水洗得淨分庚銀每淡庚一兩重用生硫一兩或半伏者七錢忍冬藤又名鷺𪆀藤兔絲子藤亦可或躑躅花荷葉煮硫四五日自倒伏硝二錢半皂角末拌硝逐旋添入鍋內作汁礬二錢半鹽二錢半上件藥同研細右將淡金作汁先用些小硫攛之提起候冷次下前藥蓋面上頭用陳壁土和鹽蓋頭又用小鍋蓋之鐵線扎縛封固通身用泥固之大火糒得十分好候冷破鍋取出其金作一塊在內銀在外包了打去外銀仍將金用前法再用藥一半再如此之又如前去銀第三次於一半藥內又去一半藥亦如前法其金方淨其銀及藥投在鉛內煎之儻金銀內有銅時先用硝提得淨了却分金銀分銀銅即次銀先用壁土泥鹽蓋在上作汁了不可攪令其自然二氣相感破鍋取出再作汁用硝伏硝多礬少再三再四提之攪得硝礬在鍋內邊上傾出銀了再鎔礬再有銀以無即止若七成者只得七分縮法青緑篇云用泥法重四十九兩數水銀半斤錫半斤千年草一枝蜈蚣草一枝同鍊吕仙賜方明窗之外著桑柴一滴方才養聖胎七七之中分造化等間一笑作金叉硃砂四兩桑灰汁二斤懸煮淨為度次膽礬四錢明信四錢石炭四兩韭杵真汁煮信黑魚膽煮礬入六乙匱玄晶石固定只在有熟之藥夫丹者乃稟天地之氣候奪日月之精光有陰有陽調和須序先明子母後察其詳藥品不知空自為之則不成矣得此者宿緣有慶仙籍書名積行纍功濟人利物如或非為甘遭玄憲純陽吕祖師仙嵓洞中親書賜方又方明窗要桑柴一味制枸子根四兩酸薑草四兩紅四錢柴一升醋一斗用鍋內煮一宿煎鍊成膏以乾為度碾碎為末黃臘為丸一點四兩每一丸重一錢即此便是神方薑草枸子根二味可以為汞捷法又方六乙匱七日火二兩炭硃砂四錢桑灰一升水銀四錢硃砂四錢水銀占住硃砂一處乳了便煮倒信韭菜根汁金銀花根著了便成癩頭硝硼砂也煮信裏若要信成汁除非衆石為硼一石硝一石蜜陀僧能點金又方藥頭一錢錫四兩水銀二兩護信二錢用醋折過與前方詳用火田農務混元丹以見寶砂半斤入合澆汞二兩醋調赤石脂蚌粉封口縫了更不固濟入以二兩火養三日第四日加火二兩通養七日夜以子午卯酉互换火日足取出開看其汞皆乾如有些小油汞未乾再封合養火三日候汞乾再開合澆二兩如此四次得乾汞半斤如作長生匱每次澆四兩七日七夜火轉汞至百兩止取上色𤇨成無比之寶靈砂九轉每澆汞二兩用火五兩候申時入火來日開看水銀已死老子曰朝種暮收早澆晚乾青芽子砂三兩澆汞三兩寅午戌火各四兩三日夜開看如未生芽又澆四兩養三日夜必生黃芽如生芽不得取動又澆四兩養五日夜又澆四兩養五日計一月六次澆四兩共二十四兩日足取出上面飛成黃芽者摘稱或半斤或十兩或一斤可取收起却别入火養湧泉變化其餘合子底不飛者作芽子不中用但和先砂作草匱一煆成寶黃芽搗碎水飛淘隨水過者鼎器養為大藥不隨水過者白砂硝為寶不可為藥或將芽子五斤為母五日一澆五兩採摘入生取熟汞不竭也四兩砂澆一兩汞火三兩養三日候冷取出又澆一兩養三日候冷開合寒林芽子生起不得動又澆一兩四次汞四兩將手抵芽子硬時方可摘下若高二三寸妙也逐旋收任意化物可變十六變乃長生室匱澆汞一絶靈砂九轉將養成汞五兩不可犯雜别作一合子每日澆汞伍兩入合內入灰缸中每用鼎火五兩每三日一次澆其汞湧起如瓊林玉樹作珍珠虬頭帶紅色及珊瑚之狀其寶可愛也修鍊大丹要旨卷上
